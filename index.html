<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#3D1670">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Magic Strategist">
  <meta name="description" content="Design loyalty strategies for 185,000 verified Magic members">
  <title>Magic Loyalty Strategist</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS
       ══════════════════════════════════════════ */
    :root {
      --magic-deep: #3D1670;
      --magic-primary: #4A1A8A;
      --magic-mid: #6B3FA0;
      --magic-light: #9B6FCC;
      --magic-wash: #F3EEFA;
      --magic-tint: #F9F6FD;

      --honey: #E8A838;
      --honey-soft: #FFF4DB;

      --surface: #FFFFFF;
      --surface-raised: #FFFFFF;
      --bg: #F7F4FB;
      --text-primary: #1A1425;
      --text-secondary: #6B5F7A;
      --text-tertiary: #9B91A8;
      --border: #E8E0F0;
      --border-light: #F0EBF5;

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px rgba(61, 22, 112, 0.06);
      --shadow-md: 0 4px 12px rgba(61, 22, 112, 0.08);
      --shadow-lg: 0 8px 30px rgba(61, 22, 112, 0.12);

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    /* ══════════════════════════════════════════
       RESET & BASE
       ══════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ══════════════════════════════════════════
       OUTER SHELL — desktop card vs mobile full-bleed
       ══════════════════════════════════════════ */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 100%;
      background: var(--surface);
    }

    /* Desktop: centered card */
    @media (min-width: 768px) {
      body {
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(ellipse at 20% 50%, rgba(74, 26, 138, 0.06) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 20%, rgba(232, 168, 56, 0.04) 0%, transparent 40%),
          var(--bg);
      }

      .app-shell {
        max-width: 520px;
        height: min(92vh, 780px);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-light);
        overflow: hidden;
      }
    }

    /* ══════════════════════════════════════════
       HEADER
       ══════════════════════════════════════════ */
    .header {
      background: linear-gradient(135deg, var(--magic-deep) 0%, var(--magic-primary) 60%, var(--magic-mid) 100%);
      color: white;
      padding: 14px 20px;
      padding-top: calc(14px + var(--safe-top));
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .header-mark {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 1px;
      font-weight: 400;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .header-status .dot {
      width: 6px;
      height: 6px;
      background: #4ADE80;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ══════════════════════════════════════════
       CHAT AREA
       ══════════════════════════════════════════ */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 767px) {
      .chat-area {
        padding: 14px;
        gap: 10px;
      }
    }

    /* ══════════════════════════════════════════
       MESSAGE BUBBLES
       ══════════════════════════════════════════ */
    .message {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      overflow-wrap: break-word;
      animation: msg-in 0.25s ease-out;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Assistant */
    .message.assistant {
      align-self: flex-start;
      background: var(--surface-raised);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }

    /* User */
    .message.user {
      align-self: flex-end;
      background: var(--magic-primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* Error */
    .message.error {
      align-self: center;
      background: #FEF2F2;
      color: #B91C1C;
      border: 1px solid #FECACA;
      font-size: 13px;
      max-width: 90%;
      text-align: center;
    }

    /* System */
    .message.system {
      align-self: center;
      background: var(--magic-wash);
      color: var(--magic-light);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: var(--radius-full);
      max-width: 90%;
      text-align: center;
    }

    /* ══════════════════════════════════════════
       MARKDOWN INSIDE ASSISTANT MESSAGES
       ══════════════════════════════════════════ */
    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3 {
      color: var(--magic-primary);
      margin: 12px 0 4px 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .message.assistant h1:first-child,
    .message.assistant h2:first-child,
    .message.assistant h3:first-child {
      margin-top: 0;
    }

    .message.assistant strong { color: var(--magic-primary); }
    .message.assistant p { margin: 5px 0; }

    .message.assistant ol,
    .message.assistant ul {
      margin: 5px 0 5px 20px;
    }
    .message.assistant li { margin: 2px 0; }

    .message.assistant a {
      color: var(--magic-mid);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Offer tables */
    .message.assistant table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0 10px 0;
      font-size: 13px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .message.assistant thead th {
      background: var(--magic-primary);
      color: white;
      padding: 7px 10px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .message.assistant tbody td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: top;
    }

    .message.assistant tbody tr:nth-child(even) {
      background: var(--magic-tint);
    }

    .message.assistant tbody tr:last-child td {
      border-bottom: none;
    }

    .message.assistant tbody td:first-child {
      font-weight: 600;
      color: var(--magic-primary);
      width: 35%;
      min-width: 100px;
    }

    /* Mobile table adjustments */
    @media (max-width: 767px) {
      .message.assistant table { font-size: 12px; }
      .message.assistant thead th { padding: 6px 8px; font-size: 10px; }
      .message.assistant tbody td { padding: 5px 8px; }
      .message.assistant tbody td:first-child { min-width: 80px; }
      .message { max-width: 93%; font-size: 13.5px; }
    }

    /* Strategy blocks */
    .strategy-block {
      background: var(--magic-wash);
      border-left: 3px solid var(--magic-mid);
      padding: 8px 12px;
      margin: 6px 0;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 13px;
    }

    /* Hide code blocks (session data) */
    .message.assistant pre { display: none; }

    .message.assistant code {
      background: var(--magic-wash);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .message.assistant hr {
      border: none;
      border-top: 2px solid var(--magic-primary);
      margin: 14px 0;
      opacity: 0.3;
    }

    /* ══════════════════════════════════════════
       TYPING INDICATOR
       ══════════════════════════════════════════ */
    .typing-container {
      align-self: flex-start;
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 0 20px 8px 20px;
    }

    @media (max-width: 767px) {
      .typing-container { padding: 0 14px 6px 14px; }
    }

    .typing-container.active { display: flex; }

    .typing-dots {
      background: var(--surface-raised);
      padding: 10px 18px;
      border-radius: var(--radius-md);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--magic-light);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

    .typing-status {
      font-size: 11px;
      color: var(--text-tertiary);
      padding-left: 6px;
      min-height: 16px;
      font-weight: 500;
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ══════════════════════════════════════════
       INPUT AREA
       ══════════════════════════════════════════ */
    .input-area {
      padding: 10px 16px;
      padding-bottom: calc(10px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    @media (min-width: 768px) {
      .input-area {
        padding: 12px 20px 16px;
      }
    }

    .input-area textarea {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      background: var(--magic-tint);
      color: var(--text-primary);
      line-height: 1.4;
    }

    .input-area textarea::placeholder {
      color: var(--text-tertiary);
    }

    .input-area textarea:focus {
      border-color: var(--magic-mid);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(74, 26, 138, 0.08);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: var(--magic-primary);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .send-btn:active {
      transform: scale(0.94);
    }

    .send-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--magic-mid);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ══════════════════════════════════════════
       CONNECTION BANNER (offline / error)
       ══════════════════════════════════════════ */
    .connection-banner {
      display: none;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      flex-shrink: 0;
    }

    .connection-banner.offline {
      display: block;
      background: var(--honey-soft);
      color: #92400E;
    }

    .connection-banner.error {
      display: block;
      background: #FEF2F2;
      color: #B91C1C;
    }

    /* ══════════════════════════════════════════
       LOADING SCREEN (initial)
       ══════════════════════════════════════════ */
    .splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--magic-deep), var(--magic-primary));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-mark {
      font-size: 48px;
      margin-bottom: 16px;
      animation: splash-float 2s ease-in-out infinite;
    }

    .splash-text {
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
      opacity: 0.9;
    }

    @keyframes splash-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* ══════════════════════════════════════════
       INSTALL PROMPT
       ══════════════════════════════════════════ */
    .install-prompt {
      display: none;
      padding: 10px 16px;
      background: var(--honey-soft);
      border-bottom: 1px solid rgba(232, 168, 56, 0.2);
      font-size: 13px;
      color: #78560E;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .install-prompt.visible { display: flex; }

    .install-prompt span { flex: 1; }

    .install-btn {
      background: var(--honey);
      color: white;
      border: none;
      padding: 5px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    .install-dismiss {
      background: none;
      border: none;
      color: #78560E;
      cursor: pointer;
      font-size: 16px;
      padding: 2px;
      opacity: 0.6;
    }

    /* ══════════════════════════════════════════
       SCROLLBAR (desktop)
       ══════════════════════════════════════════ */
    @media (min-width: 768px) {
      .chat-area::-webkit-scrollbar {
        width: 5px;
      }
      .chat-area::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-area::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 10px;
      }
      .chat-area::-webkit-scrollbar-thumb:hover {
        background: var(--magic-light);
      }
    }

    /* ══════════════════════════════════════════
       FOCUS STATES (accessibility)
       ══════════════════════════════════════════ */
    :focus-visible {
      outline: 2px solid var(--magic-mid);
      outline-offset: 2px;
    }
  </style>
</head>

<body>

  <!-- Splash screen -->
  <div class="splash" id="splash">
    <div class="splash-mark">🔮</div>
    <div class="splash-text">Magic Loyalty Strategist</div>
  </div>

  <div class="app-shell">
    <!-- Header -->
    <div class="header">
      <div class="header-mark">🔮</div>
      <div class="header-text">
        <h1>Magic Loyalty Strategist</h1>
        <p>Loyalty strategies for 185,000 members</p>
      </div>
      <div class="header-status">
        <span class="dot"></span>
        <span>ONLINE</span>
      </div>
    </div>

    <!-- Connection banner -->
    <div class="connection-banner" id="connectionBanner"></div>

    <!-- Install prompt -->
    <div class="install-prompt" id="installPrompt">
      <span>📲 Add to your home screen for quick access</span>
      <button class="install-btn" id="installBtn">Install</button>
      <button class="install-dismiss" id="installDismiss">&times;</button>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea"></div>

    <!-- Typing indicator -->
    <div class="typing-container" id="typingContainer">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="typing-status" id="typingStatus"></div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <textarea
        id="userInput"
        placeholder="Type your message..."
        rows="1"
        onkeydown="handleKeydown(event)"
        enterkeyhint="send"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Marked.js for markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <script>
    // ══════════════════════════════════════════
    // CONFIGURATION — hardcoded for merchant access
    // ══════════════════════════════════════════
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOQhBE5Ho50roGwPup07SHkxJp2ty-OXyN6UloLkOI-3AyxPVhf8KdnAw4duKT_orb_w/exec';

    // ══════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════
    var conversationHistory = [];
    var isWaiting = false;
    var statusTimers = [];
    var messageCount = 0;

    // ══════════════════════════════════════════
    // MARKED CONFIG
    // ══════════════════════════════════════════
    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false
    });

    // ══════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════
    window.addEventListener('load', function() {
      // Hide splash
      setTimeout(function() {
        document.getElementById('splash').classList.add('hidden');
        showWelcome();
      }, 800);

      // Auto-grow textarea
      var input = document.getElementById('userInput');
      input.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });
    });

    function showWelcome() {
      addMessage('assistant',
        'Welcome to Magic! 🔮\n\n' +
        'I\'m your AI Loyalty Strategist. I\'ll help you design offers that ' +
        'bring Magic\'s **185,000 verified members** to your business.\n\n' +
        'Should we speak in **English** or **Ελληνικά**?'
      );
    }

    // ══════════════════════════════════════════
    // CLEAN RESPONSE (hide internal data from display)
    // ══════════════════════════════════════════
    function cleanResponse(text) {
      // Remove session data in code blocks
      text = text.replace(/```[\s]*\n?[\s]*(?:SESSION_ID\|)?GS-[\s\S]*?```/g, '');

      // Remove bare GS- data lines
      text = text.replace(/^(?:SESSION_ID\|)?GS-\d+\|.*$/gm, '');
      text = text.replace(/^GS-XXX\|.*$/gm, '');

      // Remove "session saved" confirmations
      text = text.replace(/✅.*?(?:session|data|saved|CRM|σύστημα|αποθηκεύ).*$/gim, '');

      // Remove "Session Data" headers
      text = text.replace(/📊.*?Session Data.*$/gim, '');

      // Remove email markers
      text = text.replace(/```[\s]*\n?[\s]*📧[\s\S]*?```/g, '');
      text = text.replace(/📧EMAIL:.*?📧/g, '');

      // Clean trailing whitespace
      text = text.replace(/\n{3,}/g, '\n\n').trim();

      return text;
    }

    function hasEmailMarker(text) {
      return /📧EMAIL:.+?📧/.test(text);
    }

    // ══════════════════════════════════════════
    // STYLE STRATEGY BLOCKS
    // ══════════════════════════════════════════
    function styleStrategyBlocks(html) {
      html = html.replace(
        /Strategy Note:?<\/strong>\s*([\s\S]*?)(?=Distribution Strategy|Option \d|<\/div>|$)/gi,
        '<div class="strategy-block">🎯 <strong>Strategy Note:</strong> $1</div>'
      );
      html = html.replace(
        /Distribution Strategy:?<\/strong>\s*([\s\S]*?)(?=Option \d|Strategy Note|<\/div>|$)/gi,
        '<div class="strategy-block">📢 <strong>Distribution:</strong> $1</div>'
      );
      return html;
    }

    // ══════════════════════════════════════════
    // ADD MESSAGE TO CHAT
    // ══════════════════════════════════════════
    function addMessage(role, text) {
      var chatArea = document.getElementById('chatArea');
      var div = document.createElement('div');
      div.className = 'message ' + role;

      if (role === 'assistant') {
        var cleaned = cleanResponse(text);
        var html = marked.parse(cleaned);
        html = styleStrategyBlocks(html);
        div.innerHTML = html;
      } else if (role === 'system') {
        div.textContent = text;
      } else {
        // User and error messages — escape HTML
        div.innerHTML = text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>');
      }

      chatArea.appendChild(div);

      // Smooth scroll to bottom
      requestAnimationFrame(function() {
        chatArea.scrollTop = chatArea.scrollHeight;
      });
    }

    // ══════════════════════════════════════════
    // TYPING INDICATOR
    // ══════════════════════════════════════════
    function startTypingStatus(isLongResponse) {
      var container = document.getElementById('typingContainer');
      var statusEl = document.getElementById('typingStatus');
      container.classList.add('active');

      clearStatusTimers();

      if (isLongResponse) {
        var messages = [
          { delay: 0, text: '' },
          { delay: 3000, text: 'designing your offers...' },
          { delay: 7000, text: 'analysing your market...' },
          { delay: 12000, text: 'crafting strategies...' }
        ];
        messages.forEach(function(msg) {
          statusTimers.push(setTimeout(function() {
            statusEl.textContent = msg.text;
          }, msg.delay));
        });
      }

      document.getElementById('chatArea').scrollTop =
        document.getElementById('chatArea').scrollHeight;
    }

    function stopTypingStatus() {
      clearStatusTimers();
      document.getElementById('typingContainer').classList.remove('active');
      document.getElementById('typingStatus').textContent = '';
    }

    function clearStatusTimers() {
      statusTimers.forEach(function(t) { clearTimeout(t); });
      statusTimers = [];
    }

    // ══════════════════════════════════════════
    // KEYBOARD HANDLING
    // ══════════════════════════════════════════
    function handleKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // ══════════════════════════════════════════
    // SEND MESSAGE
    // ══════════════════════════════════════════
    function sendMessage() {
      if (isWaiting) return;

      var input = document.getElementById('userInput');
      var text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';
      input.style.height = 'auto';

      conversationHistory.push({ role: 'user', text: text });
      messageCount++;

      var isLongResponse = messageCount >= 3;

      isWaiting = true;
      startTypingStatus(isLongResponse);
      document.getElementById('sendBtn').disabled = true;

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ history: conversationHistory }),
        redirect: 'follow'
      })
      .then(function(response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
      })
      .then(function(result) {
        isWaiting = false;
        stopTypingStatus();
        document.getElementById('sendBtn').disabled = false;

        if (result.ok) {
          conversationHistory.push({ role: 'assistant', text: result.text });
          addMessage('assistant', result.text);

          if (hasEmailMarker(result.text)) {
            addMessage('system', '✉️ Offer summary sent to your email');
          } else {
            var hasSessionData = result.text.match(/GS-\d+\|/) || result.text.match(/GS-XXX\|/);
            if (hasSessionData) {
              addMessage('system', '🔒 Anonymised data helps us improve offer suggestions for your business');
            }
          }
        } else {
          addMessage('error', 'Error: ' + (result.error || 'Something went wrong'));
        }
      })
      .catch(function(err) {
        isWaiting = false;
        stopTypingStatus();
        document.getElementById('sendBtn').disabled = false;
        addMessage('error', 'Connection error. Please check your internet and try again.');
        console.error('Fetch error:', err);
      });
    }

    // ══════════════════════════════════════════
    // PWA INSTALL PROMPT
    // ══════════════════════════════════════════
    var deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;

      // Show custom install banner
      document.getElementById('installPrompt').classList.add('visible');
    });

    document.getElementById('installBtn').addEventListener('click', function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(choiceResult) {
          deferredPrompt = null;
          document.getElementById('installPrompt').classList.remove('visible');
        });
      }
    });

    document.getElementById('installDismiss').addEventListener('click', function() {
      document.getElementById('installPrompt').classList.remove('visible');
      deferredPrompt = null;
    });

    // ══════════════════════════════════════════
    // ONLINE/OFFLINE HANDLING
    // ══════════════════════════════════════════
    var banner = document.getElementById('connectionBanner');

    window.addEventListener('offline', function() {
      banner.className = 'connection-banner offline';
      banner.textContent = 'You\'re offline — messages will send when you reconnect';
    });

    window.addEventListener('online', function() {
      banner.className = 'connection-banner';
      banner.textContent = '';
    });

    // ══════════════════════════════════════════
    // SERVICE WORKER REGISTRATION
    // ══════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.log('SW registration skipped:', err.message);
      });
    }
  </script>
</body>
</html>
